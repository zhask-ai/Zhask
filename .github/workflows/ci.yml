name: CI/CD Pipeline

on:
  push:
    branches: [main, Dev-4, Dev-3, Dev-2, Dev-1]
  pull_request:
    branches: [main, Dev-4]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r <(find . -name requirements.txt -exec cat {} \;)

      - name: Lint with Ruff
        run: ruff check modules/ apps/ shared/ --select E,F,W,I,N,UP,B,SIM,RUF
        continue-on-error: true

      - name: Type check with mypy
        run: mypy modules/ apps/ shared/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: integrishield_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r <(find . -name requirements.txt -exec cat {} \;)

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://test:test@localhost:5432/integrishield_test
        run: |
          pytest tests/ -v --cov=modules --cov=apps --cov=shared --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  security:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Security scan
        run: bandit -r modules/ apps/ shared/ -f json -o bandit-report.json
        continue-on-error: true

  build-docker:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    name: Build Docker Images
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [dashboard-backend, m01-gateway, m05-sap-mcp]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-docker]
    runs-on: ubuntu-latest
    name: Deploy to zhask.io
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to zhask.io
        env:
          ZHASK_DEPLOY_KEY: ${{ secrets.ZHASK_DEPLOY_KEY }}
          ZHASK_DEPLOY_URL: ${{ secrets.ZHASK_DEPLOY_URL }}
          ZHASK_ENV: production
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$ZHASK_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add zhask.io to known hosts
          ssh-keyscan -H zhask.io >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy via git push or custom deployment script
          git push ssh://deploy@zhask.io:22/integrishield.git main:main --force-with-lease || \
          bash ./scripts/deploy-to-zhask.sh
        continue-on-error: true

      - name: Verify deployment
        run: |
          echo "Deployment initiated. Check zhask.io dashboard for status."
