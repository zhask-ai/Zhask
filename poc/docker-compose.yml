  # ═══════════ Demo producer (run with --profile demo) ═══════════

  demo-producer:
    build:
      context: ..
      dockerfile: poc/seed-injector/Dockerfile
    container_name: integrishield-demo-producer
    environment:
      REDIS_URL: redis://redis:6379
      INJECT_DELAY_MS: "1500"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - demo
    restart: "no"

volumes:
  pgdata:
