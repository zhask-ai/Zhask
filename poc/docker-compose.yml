  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy

  # ═══════════ Dev4 — Dashboard UI ═══════════
  # Uncomment when Dev4's UI build is ready
  # dashboard-ui:
