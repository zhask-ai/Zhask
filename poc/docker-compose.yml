# IntegriShield POC — Full Stack
# Owned by Dev 1.  Combines all active POC services.
#
# Services            Owner   Port
# ─────────────────────────────────────────────
# redis               infra   6379
# postgres            infra   5432
# mock-sap            Dev 1   8080
# m01-api-gateway     Dev 1   8000   ← entry point for RFC calls
# m03-traffic-anlzr   Dev 2   (internal)
# m08-anomaly-det     Dev 2   (internal)
# m09-dlp             Dev 2   (internal)
# m11-shadow-integ    Dev 2   (internal)
# mlflow              Dev 2   5001
# seed-injector       Dev 1   (one-shot)
#
# Quick start (Dev 1 — no ML model required):
#   docker-compose up --build mock-sap m01-api-gateway-shield redis postgres
#
# Full POC demo (all services):
#   1. python ml/training/train_model.py   ← Dev 2 step, needed for M08
#   2. docker-compose up --build
#   3. Endpoints:
#        M01 proxy:   http://localhost:8000/rfc/proxy
#        M01 docs:    http://localhost:8000/docs
#        Mock SAP:    http://localhost:8080/health
#        MLflow:      http://localhost:5001
#   4. Inspect streams:
#        docker exec integrishield-redis redis-cli XRANGE rfc_events - +
#        docker exec integrishield-redis redis-cli XRANGE anomaly_events - +
#        docker exec integrishield-redis redis-cli XRANGE shadow_alerts - +
#
# Continuous demo (slower injection for live walkthrough):
#   docker-compose --profile demo up --build

x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  LOG_LEVEL: INFO

services:

  # ═══════════ Infrastructure ═══════════
  redis:
    image: redis:7-alpine
    container_name: integrishield-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: integrishield-postgres
    environment:
      POSTGRES_DB: integrishield
      POSTGRES_USER: integrishield
      POSTGRES_PASSWORD: integrishield_dev
    ports:
      - "5432:5432"
    volumes:
      - ../infrastructure/sql/audit_events.sql:/docker-entrypoint-initdb.d/01-audit-events.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integrishield"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════ Dev2 — MLflow Tracking UI ═══════════

  mlflow:
    image: python:3.12-slim
    container_name: integrishield-mlflow
    working_dir: /mlflow
    command: >
      sh -c "pip install mlflow==2.17.2 --quiet &&
             mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5001:5000"
    volumes:
      - ../ml/mlruns:/mlflow

  # ═══════════ Dev1 — M01 API Gateway Shield ═══════════
  # Uncomment when Dev1's M01 Dockerfile is ready
  # m01-api-gateway-shield:
  #   build:
  #     context: ../modules/m01-api-gateway-shield
  #   container_name: integrishield-m01
  #   environment:
  #     REDIS_URL: redis://redis:6379/0
  #     PUBLISH_STREAM: integrishield:api_call_events
  #   ports:
  #     - "8001:8001"
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # ═══════════ Dev2 — ML Pipeline Modules ═══════════
  m03-traffic-analyzer:
    build:
      context: ..
      dockerfile: modules/m03-traffic-analyzer/Dockerfile
    container_name: integrishield-m03
    environment:
      <<: *common-env
      INPUT_STREAM: rfc_events
      OUTPUT_STREAM: analyzed_events
      CONSUMER_NAME: m03-traffic-analyzer
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev2 — M08 Anomaly Detection ═══════════

  m08-anomaly-detection:
    build:
      context: ..
      dockerfile: modules/m08-anomaly-detection/Dockerfile
    container_name: integrishield-m08
    environment:
      <<: *common-env
      INPUT_STREAM: analyzed_events
      OUTPUT_STREAM: anomaly_events
      CONSUMER_NAME: m08-anomaly-detection
      MODEL_PATH: /app/ml/models/isolation_forest_v1.pkl
    volumes:
      - ../ml/models:/app/ml/models:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev2 — M09 DLP ═══════════

  m09-dlp:
    build:
      context: ..
      dockerfile: modules/m09-dlp/Dockerfile
    container_name: integrishield-m09
    environment:
      <<: *common-env
      INPUT_STREAM: analyzed_events
      OUTPUT_STREAM: dlp_alerts
      CONSUMER_NAME: m09-dlp
      HIGH_ROW_COUNT_THRESHOLD: "10000"
      BLOCKLIST_ROW_THRESHOLD: "5000"
      VELOCITY_THRESHOLD: "50"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev2 — M11 Shadow Integration ═══════════

  m11-shadow-integration:
    build:
      context: ..
      dockerfile: modules/m11-shadow-integration/Dockerfile
    container_name: integrishield-m11
    environment:
      <<: *common-env
      INPUT_STREAM: rfc_events
      OUTPUT_STREAM: shadow_alerts
      CONSUMER_NAME: m11-shadow-integration
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev3 — M05 SAP MCP Suite ═══════════
  m05-sap-mcp-suite:
    build:
      context: ..
      dockerfile: modules/m05-sap-mcp-suite/Dockerfile
    container_name: integrishield-m05
    environment:
      <<: *common-env
      M05_REDIS_URL: redis://redis:6379/0
      M05_CONSUME_STREAMS: "integrishield:api_call_events,integrishield:anomaly_events,integrishield:dlp_alerts,integrishield:alert_events"
      M05_PUBLISH_STREAM: integrishield:mcp_query_events
      M05_AUTH_POC_MODE: "true"
    ports:
      - "8005:8005"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev3 — M07 Compliance Autopilot ═══════════
  m07-compliance-autopilot:
    build:
      context: ..
      dockerfile: modules/m07-compliance-autopilot/Dockerfile
    container_name: integrishield-m07
    environment:
      <<: *common-env
      M07_REDIS_URL: redis://redis:6379/0
      M07_DATABASE_URL: postgresql://integrishield:integrishield_dev@postgres:5432/integrishield
      M07_CONSUME_STREAMS: "integrishield:api_call_events,integrishield:anomaly_events,integrishield:dlp_alerts,integrishield:shadow_alerts,integrishield:alert_events"
      M07_PUBLISH_EVIDENCE_STREAM: integrishield:compliance_evidence
      M07_PUBLISH_ALERT_STREAM: integrishield:compliance_alerts
      M07_CONTROLS_CONFIG_PATH: /app/config/controls
      M07_AUTH_POC_MODE: "true"
    ports:
      - "8007:8007"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev3 — M10 Incident Response ═══════════
  m10-incident-response:
    build:
      context: ..
      dockerfile: modules/m10-incident-response/Dockerfile
    container_name: integrishield-m10
    environment:
      <<: *common-env
      M10_REDIS_URL: redis://redis:6379/0
      M10_DATABASE_URL: postgresql://integrishield:integrishield_dev@postgres:5432/integrishield
      M10_CONSUME_ALERT_STREAM: integrishield:alert_events
      M10_CONSUME_ANOMALY_STREAM: integrishield:anomaly_events
      M10_CONSUME_DLP_STREAM: integrishield:dlp_alerts
      M10_PUBLISH_STREAM: integrishield:incident_events
      M10_SLACK_WEBHOOK_URL: ""
      M10_PAGERDUTY_ROUTING_KEY: ""
      M10_SIEM_ENDPOINT: ""
      M10_AUTH_POC_MODE: "true"
    ports:
      - "8010:8010"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev3 — M13 SBOM Scanner ═══════════
  m13-sbom-scanner:
    build:
      context: ..
      dockerfile: modules/m13-sbom-scanner/Dockerfile
    container_name: integrishield-m13
    environment:
      <<: *common-env
      M13_REDIS_URL: redis://redis:6379/0
      M13_PUBLISH_STREAM: integrishield:sbom_scan_events
      M13_CVE_STUBS_PATH: /app/config/cve_stubs.json
      M13_AUTH_POC_MODE: "true"
    ports:
      - "8013:8013"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════ Dev4 — Dashboard Backend ═══════════
  dashboard-backend:
    build:
      context: ..
      dockerfile: apps/dashboard/backend/Dockerfile
    container_name: integrishield-dashboard-backend
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://integrishield:integrishield_dev@postgres:5432/integrishield
      STREAM_API_CALLS: integrishield:api_call_events
      STREAM_ANOMALIES: integrishield:anomaly_scores
      STREAM_SAP_MCP: integrishield:sap_mcp_events
      STREAM_ALERTS: integrishield:alert_events
      STREAM_ZERO_TRUST: integrishield:zero_trust_events
      STREAM_CREDENTIALS: integrishield:credential_events
      STREAM_CLOUD_POSTURE: integrishield:cloud_posture_events
      REDIS_START_ID: "$"
    ports:
      - "8787:8787"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ═══════════ Dev4 — Dashboard UI ═══════════
  dashboard-ui:
    image: nginx:alpine
    container_name: integrishield-dashboard-ui
    ports:
      - "4173:80"
    volumes:
      - ../apps/dashboard:/usr/share/nginx/html:ro
    depends_on:
      - dashboard-backend

  # ═══════════ One-shot: Seed Injector (Dev2) ═══════════
  seed-injector:
    build:
      context: ..
      dockerfile: poc/seed-injector/Dockerfile
    container_name: integrishield-seed-injector
    environment:
      REDIS_URL: redis://redis:6379
      INJECT_DELAY_MS: "200"
    depends_on:
      redis:
        condition: service_healthy
      m01-api-gateway-shield:
        condition: service_healthy
      m03-traffic-analyzer:
        condition: service_started
      m08-anomaly-detection:
        condition: service_started
      m09-dlp:
        condition: service_started
      m11-shadow-integration:
        condition: service_started
    restart: "no"

  # ═══════════ Dev1 — Mock SAP Backend ═══════════

  mock-sap:
    build:
      context: ..
      dockerfile: poc/mock-sap/Dockerfile
    container_name: integrishield-mock-sap
    environment:
      MOCK_SAP_BULK_ROWS: "80000"
      MOCK_SAP_NORMAL_ROWS: "500"
      MOCK_SAP_LATENCY_MS: "120"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════ Dev1 — M01 API Gateway Shield ═══════════

  m01-api-gateway-shield:
    build:
      context: ..
      dockerfile: modules/m01-api-gateway-shield/Dockerfile
    container_name: integrishield-m01
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://integrishield:integrishield_dev@postgres:5432/integrishield
      SAP_BACKEND_URL: http://mock-sap:8080
      INTEGRISHIELD_API_KEYS: poc-dev-key-abc123
      BULK_ROW_THRESHOLD: "10000"
      SAP_TIMEOUT_S: "30"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mock-sap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════ Dev3 — M05 SAP MCP Suite ═══════════
  # Uncomment when Dev3's Dockerfile is ready
  # m05-sap-mcp-suite:
  #   build:
  #     context: ../modules/m05-sap-mcp-suite
  #   container_name: integrishield-m05
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     PUBLISH_STREAM: sap_mcp_events
  #   ports:
  #     - "8005:8005"
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # ═══════════ Dev4 — Dashboard Backend ═══════════
  # Uncomment when Dev4's Dockerfile is ready
  # dashboard-backend:
  #   build:
  #     context: ..
  #     dockerfile: apps/dashboard/backend/Dockerfile
  #   container_name: integrishield-dashboard-backend
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     DATABASE_URL: postgresql://integrishield:integrishield_dev@postgres:5432/integrishield
  #     STREAM_API_CALLS: rfc_events
  #     STREAM_ANOMALIES: anomaly_events
  #     STREAM_DLP: dlp_alerts
  #     STREAM_SHADOW: shadow_alerts
  #   ports:
  #     - "8787:8787"
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy

  # ═══════════ Dev4 — Dashboard UI ═══════════
  # Uncomment when Dev4's UI build is ready
  # dashboard-ui:
  #   image: nginx:alpine
  #   container_name: integrishield-dashboard-ui
  #   ports:
  #     - "4173:80"
  #   volumes:
  #     - ../apps/dashboard:/usr/share/nginx/html:ro
  #   depends_on:
  #     - dashboard-backend

  # ═══════════ Demo producer (run with --profile demo) ═══════════

  demo-producer:
    build:
      context: ..
      dockerfile: apps/dashboard/backend/Dockerfile
    container_name: integrishield-demo-producer
    command: ["python", "scripts/demo_event_producer.py", "--redis-url", "redis://redis:6379/0", "--interval", "1.5", "--count", "0"]
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - demo

volumes:
  pgdata:
