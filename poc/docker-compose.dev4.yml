services:
  redis:
    image: redis:7-alpine
    container_name: integrishield-redis
    ports:
      - "6379:6379"

  dashboard-backend:
    build:
      context: ..
      dockerfile: apps/dashboard/backend/Dockerfile
    image: integrishield-dashboard-backend
    container_name: integrishield-dashboard-backend
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_STREAM_KEY: integrishield:api_call_events
      REDIS_START_ID: "$"
    ports:
      - "8787:8787"
    depends_on:
      - redis

  dashboard-ui:
    image: nginx:alpine
    container_name: integrishield-dashboard-ui
    ports:
      - "4173:80"
    volumes:
      - ../apps/dashboard:/usr/share/nginx/html:ro
    depends_on:
      - dashboard-backend
