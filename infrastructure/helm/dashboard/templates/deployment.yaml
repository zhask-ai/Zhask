apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: integrishield-dashboard
  template:
    metadata:
      labels:
        app: integrishield-dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: REDIS_URL
              value: {{ .Values.env.redisUrl | quote }}
            - name: REDIS_STREAM_KEY
              value: {{ .Values.env.redisStreamKey | quote }}
            - name: REDIS_START_ID
              value: {{ .Values.env.redisStartId | quote }}
          ports:
            - containerPort: 8787
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
