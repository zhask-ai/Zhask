replicaCount: 1

image:
  repository: ghcr.io/your-org/integrishield-dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

env:
  redisUrl: redis://integrishield-redis:6379/0
  redisStreamKey: integrishield:api_call_events
  redisStartId: "$"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
